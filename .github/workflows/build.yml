name: Build All Platforms CC

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0) — used to label artifacts'
        required: false
        default: ''

# Cancel any in-progress run on the same branch when a new one starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  # Disable daemon (not useful on ephemeral CI runners), cap heap
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4g"

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # ANDROID  →  debug APK
  # ──────────────────────────────────────────────────────────────────────────
  android:
    name: 🤖 Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # iOS  →  unsigned IPA  (Flutter-style: archive → Payload zip)
  # No signing secrets needed; sideload or re-sign locally
  # ──────────────────────────────────────────────────────────────────────────
  ios:
    name: 🍎 iOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-

      # Mirror of the Flutter workflow's xcodebuild archive step
      - name: Archive iOS app (no codesign)
        working-directory: iosApp
        run: |
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive \
            -archivePath "${{ runner.temp }}/Countdown.xcarchive"

      # Mirror of the Flutter workflow's "Archive & export IPA" step
      - name: Create unsigned IPA
        run: |
          VERSION="${{ inputs.version }}"
          [ -z "$VERSION" ] && VERSION="${{ github.ref_name }}"
          mkdir -p Payload
          cp -r "${{ runner.temp }}/Countdown.xcarchive/Products/Applications/"*.app Payload/
          zip -qq -r "Countdown-unsigned-${VERSION}.ipa" Payload
          rm -rf Payload

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: Countdown-unsigned-*.ipa
          if-no-files-found: warn
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # DESKTOP  →  .deb (Linux) + .msi (Windows) via matrix
  # ──────────────────────────────────────────────────────────────────────────
  desktop:
    name: 🖥️ Desktop (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            artifact-name: desktop-linux
            dist-task: packageDeb
            dist-path: desktopApp/build/compose/binaries/main/deb/*.deb

          - os: windows-latest
            os-label: Windows
            artifact-name: desktop-windows
            dist-task: packageMsi
            dist-path: desktopApp/build/compose/binaries/main/msi/*.msi

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop distribution
        run: ./gradlew :desktopApp:${{ matrix.dist-task }} --no-daemon

      - name: Upload distribution
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.dist-path }}
          if-no-files-found: warn
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # WEB  →  WasmJS + JS browser bundles
  # ──────────────────────────────────────────────────────────────────────────
  web:
    name: 🌐 Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Wasm toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Build WasmJS browser distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution --no-daemon

      - name: Build JS browser distribution
        run: ./gradlew :webApp:jsBrowserDistribution --no-daemon

      - name: Upload WasmJS bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-wasmjs
          path: webApp/build/dist/wasmJs/productionExecutable/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload JS bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-js
          path: webApp/build/dist/js/productionExecutable/
          if-no-files-found: warn
          retention-days: 7